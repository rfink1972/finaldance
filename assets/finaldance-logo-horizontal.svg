<svg viewBox="0 0 780 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Final Dance Fantasy Football — 2026 Dynasty League">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&amp;family=Inter:wght@600;700&amp;display=swap');</style>
    <linearGradient id="l-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17365A"/><stop offset="1" stop-color="#0A1729"/>
    </linearGradient>
    <linearGradient id="l-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE187"/><stop offset="0.5" stop-color="#F5B301"/><stop offset="1" stop-color="#C98A00"/>
    </linearGradient>
    <linearGradient id="l-word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE187"/><stop offset="1" stop-color="#F5B301"/>
    </linearGradient>
    <clipPath id="l-ball-clip"><ellipse cx="120" cy="160" rx="62" ry="35"/></clipPath>
    <symbol id="l-star" viewBox="-10 -10 20 20">
      <path d="M0 -9 L2.6 -2.8 L9 -2.8 L3.8 1.4 L5.6 8 L0 4 L-5.6 8 L-3.8 1.4 L-9 -2.8 L-2.6 -2.8 Z"/>
    </symbol>
  </defs>

  <!-- crest, scaled -->
  <g transform="translate(6 16) scale(0.64)">
    <path d="M42 24 L198 24 Q210 24 210 40 L210 150 Q210 212 120 246 Q30 212 30 150 L30 40 Q30 24 42 24 Z"
          fill="url(#l-shield)" stroke="#F5B301" stroke-width="7"/>
    <path d="M49 34 L191 34 Q200 34 200 44 L200 150 Q200 204 120 233 Q40 204 40 150 L40 44 Q40 34 49 34 Z"
          fill="none" stroke="rgba(245,179,1,0.30)" stroke-width="2"/>
    <use href="#l-star" x="105" y="47" width="30" height="30" fill="url(#l-gold)"/>
    <use href="#l-star" x="72" y="60" width="22" height="22" fill="url(#l-gold)"/>
    <use href="#l-star" x="146" y="60" width="22" height="22" fill="url(#l-gold)"/>
    <g transform="rotate(-18 120 160)">
      <ellipse cx="120" cy="160" rx="62" ry="35" fill="url(#l-gold)" stroke="#8A5A00" stroke-width="3"/>
      <g clip-path="url(#l-ball-clip)" fill="#0A1729">
        <rect x="66" y="120" width="7" height="80" rx="3"/><rect x="167" y="120" width="7" height="80" rx="3"/>
      </g>
      <g stroke="#0A1729" stroke-width="4" stroke-linecap="round">
        <line x1="97" y1="160" x2="143" y2="160"/>
        <line x1="102" y1="152" x2="102" y2="168"/><line x1="112" y1="151" x2="112" y2="169"/>
        <line x1="122" y1="151" x2="122" y2="169"/><line x1="132" y1="152" x2="132" y2="168"/>
      </g>
    </g>
  </g>

  <!-- broadcast red tab -->
  <rect x="188" y="44" width="6" height="86" fill="#E4002B"/>

  <!-- wordmark -->
  <text x="208" y="96" font-family="Oswald, sans-serif" font-weight="700" font-size="66"
        letter-spacing="2" fill="url(#l-word)">FINAL DANCE</text>
  <text x="211" y="126" font-family="Inter, sans-serif" font-weight="600" font-size="18.5"
        letter-spacing="7.5" fill="#CBD8E6">FANTASY FOOTBALL</text>

  <!-- tagline -->
  <rect x="211" y="146" width="11" height="11" fill="#E4002B"/>
  <text x="230" y="156" font-family="Inter, sans-serif" font-weight="700" font-size="14.5"
        letter-spacing="4.5" fill="#F5B301">2026 DYNASTY LEAGUE</text>
</svg>
